<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Api Dragon Ball</title>
  </head>
  <body>
    <h1>Api Dragon Ball</h1>
    <p>
      Bienvenido a la API de Dragon Ball. Aquí puedes encontrar información
      sobre los personajes, sus transformaciones y mucho más. Selecciona una
      raza para comenzar a explorar el universo de Dragon Ball.
    </p>
    <select id="race-select">
      <option value="">Selecciona una raza</option>
    </select>
    <button
      onclick="
        obtenerCharactersPorRaza(document.getElementById('race-select').value)
      "
    >
      Buscar
    </button>
    <table id="characters-table" border="1">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Ki</th>
          <th>Genero</th>
          <th>Imagen</th>
          <th>Detalle</th>
        </tr>
      </thead>
      <tbody>
        <!-- Aquí se llenarán los personajes -->
      </tbody>
    </table>
    <!-- modal para imagen -->
    <div id="image-modal" style="display: none">
      <div id="modal-content">
        <img id="modal-image" src="" alt="Character Image" />
      </div>
    </div>

    <div id="detail-modal" style="display: none">
      <div id="detail-content">
        <p id="modal-detail"></p>
      </div>
    </div>

    <select name="" id="transformations-select" style="display: none">
      <option value="">Selecciona una transformación</option>
    </select>
    <button
      style="display: none"
      id="button-transformacion"
      onclick="mostrarModalTransformacion(document.getElementById('transformations-select').value)"
    >
      Ver Transformación
    </button>

    <script>
      const races = [
        "Human", "Saiyan", "Namekian", "Majin", "Frieza Race", 
        "Android", "Jiren Race", "God", "Angel", "Evil", 
        "Nucleico", "Nucleico benigno", "Unknown"
      ];

      const select = document.getElementById("race-select");
      races.forEach((race) => {
        const option = document.createElement("option");
        option.value = race;
        option.textContent = race;
        select.appendChild(option);
      });

      let currentTransformations = [];

      function obtenerCharactersPorRaza(raza) {
        if (!raza) return alert("Selecciona una raza");
        fetch(`https://dragonball-api.com/api/characters?race=${encodeURIComponent(raza)}&limit=10`)
          .then((response) => response.json())
          .then((data) => {
            const tableBody = document.querySelector("#characters-table tbody");
            tableBody.innerHTML = "";
            const characters = Array.isArray(data) ? data : (data.items || []);
            
            characters.forEach((character) => {
              const row = document.createElement("tr");
              row.innerHTML = `
                <td>${character.name}</td>
                <td>${character.ki}</td>
                <td>${character.gender}</td>
                <td><button onclick="mostrarImagen('${character.image}')">Ver Imagen</button></td>
                <td><button onclick="mostrarDetalle(${character.id})">Ver Detalle</button></td>
              `;
              tableBody.appendChild(row);
            });
          })
          .catch((error) => console.error("Error:", error));
      }

      function mostrarImagen(imageUrl) {
        const modal = document.getElementById("image-modal");
        const modalImage = document.getElementById("modal-image");
        modalImage.src = imageUrl;
        modalImage.style.maxWidth = "300px";
        modal.style.display = "block";
        modal.onclick = () => modal.style.display = "none"; // Cerrar al hacer clic
      }

      function mostrarDetalle(characterId) {
        fetch(`https://dragonball-api.com/api/characters/${characterId}`)
          .then((response) => response.json())
          .then((data) => {
            const transSelect = document.getElementById("transformations-select");
            const modal = document.getElementById("detail-modal");
            const modalDetail = document.getElementById("modal-detail");
            const btnTrans = document.getElementById("button-transformacion");

            modalDetail.innerHTML = `
              <strong>Nombre:</strong> ${data.name}<br>
              <strong>Ki:</strong> ${data.ki}<br>
              <strong>Raza:</strong> ${data.race}<br>
              <strong>Descripción:</strong> ${data.description}
            `;
            
            currentTransformations = data.transformations || [];
            if (currentTransformations.length > 0) {
              llenarSelectTransformaciones(currentTransformations);
              transSelect.style.display = "inline-block";
              btnTrans.style.display = "inline-block";
            } else {
              transSelect.style.display = "none";
              btnTrans.style.display = "none";
            }
            
            modal.style.display = "block";
            // Mostrar también la imagen del personaje
            mostrarImagen(data.image);
          })
          .catch((error) => console.error("Error:", error));
      }

      function llenarSelectTransformaciones(transformations) {
        const select = document.getElementById("transformations-select");
        select.innerHTML = '<option value="">Selecciona una transformación</option>';
        transformations.forEach((t) => {
          const option = document.createElement("option");
          option.value = t.id;
          option.textContent = t.name;
          select.appendChild(option);
        });
      }

      function mostrarModalTransformacion(id) {
        if (!id) return;
        const transformation = currentTransformations.find(t => t.id == id);
        if (transformation) {
          // Actualizar imagen
          const modalImage = document.getElementById("modal-image");
          modalImage.src = transformation.image;
          
          // Actualizar texto del detalle
          const modalDetail = document.getElementById("modal-detail");
          modalDetail.innerHTML = `
            <strong>Transformación:</strong> ${transformation.name}<br>
            <strong>Ki:</strong> ${transformation.ki}<br>
          `;
        }
      }
    </script>
  </body>
</html>
