<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Api Dragon Ball</title>
  </head>
  <body>
    <h1>Api Dragon Ball</h1>
    <p>
      Bienvenido a la API de Dragon Ball. Aquí puedes encontrar información
      sobre los personajes, episodios y más relacionados con el universo de
      Dragon Ball.
    </p>
    <select id="race-select">
      <option value="">Selecciona una raza</option>
    </select>
    <button
      onclick="
        obtenerCharactersPorRaza(document.getElementById('race-select').value)
      "
    >
      Buscar
    </button>
    <table id="characters-table" border="1">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Ki</th>
          <th>Genero</th>
          <th>Imagen</th>
          <th>Detalle</th>
        </tr>
      </thead>
      <tbody>
        <!-- Aquí se llenarán los personajes -->
      </tbody>
    </table>
    <!-- modal para imagen -->
    <div id="image-modal" style="display: none">
      <div id="modal-content">
        <img id="modal-image" src="" alt="Character Image" />
      </div>
    </div>

    <div id="detail-modal" style="display: none">
      <div id="detail-content">
        <p id="modal-detail"></p>
      </div>
    </div>

    <select name="" id="transformations-select" style="display: none">
      <option value="">Selecciona una transformación</option>
    </select>
    <script>
      // Lista de razas
      const races = [
        "Human",
        "Saiyan",
        "Namekian",
        "Majin",
        "Frieza Race",
        "Android",
        "Jiren Race",
        "God",
        "Angel",
        "Evil",
        "Nucleico",
        "Nucleico benigno",
        "Unknown",
      ];

      // Llenar el select con las razas
      const select = document.getElementById("race-select");
      races.forEach((race) => {
        const option = document.createElement("option");
        option.value = race;
        option.textContent = race;
        select.appendChild(option);
      });

      // Obtener characters por raza
      function obtenerCharactersPorRaza(raza) {
        fetch(
          `https://dragonball-api.com/api/characters?race=${encodeURIComponent(raza)}&limit=5`,
        )
          .then((response) => response.json())
          .then((data) => {
            console.log("Characters de raza " + raza + ":", data);
            const tableBody = document.querySelector("#characters-table tbody");
            tableBody.innerHTML = ""; // Limpiar la tabla antes de llenarla
            data.forEach((character) => {
              const row = document.createElement("tr");
              row.innerHTML = `
                <td>${character.name}</td>
                <td>${character.ki}</td>
                <td>${character.gender}</td>
                <td><button onclick="mostrarImagen('${character.image}')">Mostrar Imagen</button></td>
                <td><button onclick="mostrarDetalle(${character.id})">Mostrar Detalle</button></td>
              `;
              tableBody.appendChild(row);
            });
          })
          .catch((error) => {
            console.error("Error al obtener characters por raza:", error);
          });
      }

      function obtenerTransformacionesPorCharacter(characterId) {
        fetch(
          `https://dragonball-api.com/api/characters/${characterId}/transformations`,
        )
          .then((response) => response.json())
          .then((data) => {
            console.log(
              "Transformaciones del character " + characterId + ":",
              data,
            );
            const select = document.getElementById("transformations-select");
            data.forEach((transformation) => {
              const option = document.createElement("option");
              option.value = transformation.id;
              option.textContent = transformation.name;
              select.appendChild(option);
            });
          })
          .catch((error) => {
            console.error(
              "Error al obtener transformaciones por character:",
              error,
            );
          });
      }

      function limpiarTabla() {
        const tableBody = document.querySelector("#characters-table tbody");
        tableBody.innerHTML = "";
      }

      function mostrarImagen(imageUrl) {
        const modal = document.getElementById("image-modal");
        const modalImage = document.getElementById("modal-image");
        modalImage.src = imageUrl;
        modal.style.display = "block";
      }

      function mostrarDetalle(characterId) {
        fetch(`https://dragonball-api.com/api/characters/${characterId}`)
          .then((response) => response.json())
          .then((data) => {
            console.log("Detalle del character " + characterId + ":", data);
            const select = document.getElementById("transformations-select");
            const modal = document.getElementById("detail-modal");
            const modalDetail = document.getElementById("modal-detail");
            modalDetail.textContent = `Nombre: ${data.name}, Ki: ${data.ki}, Género: ${data.gender}`;
            select.style.display = "block";
            modal.style.display = "block";
            obtenerTransformacionesPorCharacter(characterId);
            llenarSelectTransformaciones(data.transformations);
          })
          .catch((error) => {
            console.error("Error al obtener detalle del character:", error);
          });
      }
      function llenarSelectTransformaciones(transformations) {
        const select = document.getElementById("transformations-select");
        select.innerHTML = ""; // Limpiar el select antes de llenarlo
        transformations.forEach((transformation) => {
          const option = document.createElement("option");
          option.value = transformation.id;
          option.textContent = transformation.name;
          select.appendChild(option);
        });
      }
    </script>
  </body>
</html>
